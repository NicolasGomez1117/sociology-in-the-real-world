<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P5 First Slide Iterations</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #020712;
        --panel: rgba(6, 15, 31, 0.78);
        --panel-border: rgba(191, 219, 254, 0.16);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #7dd3fc;
        --accent-2: #bae6fd;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at top, #061126 0%, var(--bg) 58%);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
      }

      canvas {
        display: block;
      }

      #ui {
        position: fixed;
        inset: 1rem auto auto 1rem;
        width: min(360px, calc(100vw - 2rem));
        padding: 1rem 1rem 0.85rem;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.32);
        z-index: 10;
      }

      #eyebrow {
        margin: 0 0 0.25rem;
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
      }

      #title {
        margin: 0;
        font-size: 1.35rem;
        line-height: 1.1;
      }

      #subtitle {
        margin: 0.45rem 0 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.45;
      }

      #mode-grid {
        margin-top: 0.9rem;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.45rem;
      }

      .mode-button {
        border: 1px solid rgba(125, 211, 252, 0.12);
        border-radius: 12px;
        padding: 0.52rem 0.6rem;
        background: rgba(14, 24, 42, 0.7);
        color: var(--text);
        font-size: 0.8rem;
        text-align: left;
        cursor: pointer;
        transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
      }

      .mode-button:hover {
        border-color: rgba(125, 211, 252, 0.35);
        transform: translateY(-1px);
      }

      .mode-button.active {
        border-color: rgba(186, 230, 253, 0.52);
        background: rgba(12, 74, 110, 0.42);
      }

      #legend {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        width: min(360px, calc(100vw - 2rem));
        padding: 0.9rem 1rem;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        background: rgba(4, 10, 24, 0.68);
        backdrop-filter: blur(14px);
        z-index: 10;
      }

      #legend p {
        margin: 0;
        font-size: 0.88rem;
        color: var(--muted);
        line-height: 1.5;
      }

      #legend strong {
        color: var(--accent-2);
      }

      .kbd {
        display: inline-block;
        min-width: 1.45em;
        padding: 0.05rem 0.3rem;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-size: 0.8rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <section id="ui">
      <p id="eyebrow">p5.js prototype · first slide only</p>
      <h1 id="title">Loading iterations...</h1>
      <p id="subtitle">Generating node-field views of your "old maps, new terrain" opener.</p>
      <div id="mode-grid"></div>
    </section>

    <section id="legend">
      <p>
        <strong>Controls:</strong> use <span class="kbd">1</span> through <span class="kbd">0</span> to switch
        iterations, <span class="kbd">Space</span> to auto-cycle, and <span class="kbd">R</span> to regenerate.
      </p>
    </section>

    <script src="./node_modules/p5/lib/p5.min.js"></script>
    <script src="./p5-first-slide.js"></script>
  </body>
</html>
